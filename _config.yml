# ---------------- #
#   Main Configs   #
# ---------------- #
baseurl: ""
url: "https://mauphilos.github.io"
date_format: "ordinal"
title: MauPhilos
subtitle: "记录思考、技术与有趣的互联网"
description: "欢迎来到 MauPhilos。这是一个记录思考、整理技术、分享工具与网络见闻的个人站点。在这里，你会看到实用的软件资源、折腾笔记、数字生活经验，以及值得收藏的互联网内容。"
keywords: MauPhilos,个人博客,技术博客,互联网分享,实用工具,软件推荐,折腾笔记,数字生活,网络资源,GitHub Pages
timezone: Asia/Shanghai
encoding: "utf-8"

# 页面左下角显示的年份
since: 2024

# 源码仓库，请替换成自己的
repository: mauphilos/mauphilos.github.io

# 对 css 和 js 资源的 cdn 加速配置
cdn:
    jsdelivr:
        enabled: false

# 可选组件配置
components:
    # 分享
    # weibo,qq,wechat,douban,qzone,linkedin,facebook,twitter
    share:
        enabled: false
        hide-platforms: qq,facebook

    # 不蒜子访问统计
    busuanzi:
        enabled: true
        start_date: 2024-03-03

    # My Popular Repositories
    side_bar_repo:
        enabled: true
        limit: 5

    # 文章字数统计
    word_count:
        enabled: true

    # 页面右上角，以及「关于」页面的二维码
    # 修改图片请替换 assets/images/qrcode.jpg
    qrcode:
        enabled: false
        image_alt: MauPhilos

    # 维基索引页使用哪种视图，支持 列表（list）/分类（cate）
    wiki:
        view: cate

    # 图片灯箱效果功能
    fancybox:
        enabled: false

# 压缩页面内容
compress_html:
  clippings: all
  comments: ["<!--", "-->"]

# 代码高亮风格，支持的 theme 列表见 https://github.com/mzlogin/rouge-themes
highlight_theme: github

# ---------------- #
#      Author      #
# ---------------- #
author: MauPhilos
organization:
organization_url:
github_username: mauphilos
location: China
email: your-email@example.com

# ---------------- #
#    Navigation    #
# ---------------- #
navs:
  -
    href: /
    label: 首页

  -
    href: /categories/
    label: 分享

  -
    href: /archives/
    label: 归档
    mobile-hidden: true

  -
    href: /fragments/
    label: 碎片

  -
    href: /daily/
    label: 英语

  -
    href: /wiki/
    label: 维基

  -
    href: /links/
    label: 链接
    mobile-hidden: true

  -
    href: /about/
    label: 关于

# ---------------- #
#       RSS        #
# ---------------- #
subscribe_rss: /feed.xml

# ---------------- #
#      Jekyll      #
# ---------------- #
markdown: kramdown
kramdown:
    input: GFM
highlighter: rouge
paginate: 10
lsi: false
quiet: false
excerpt_separator: "\n\n"
permalink: /:year/:month/:day/:title/
plugins:
    - jekyll-github-metadata
    - rouge
    - jekyll-paginate
    - jekyll-sitemap
    - jekyll-feed
    - jemoji

collections:
    wiki:
        output: true
        permalink: /wiki/:path/
    fragments:
        output: true
        permalink: /fragment/:path/
    daily:
        output: true
        permalink: /:collection/:year/:month/:title/

# ---------------- #
#      Comments    #
# ---------------- #
# support provider: disqus, gitment, gitalk, utterances, beaudar, giscus
comments_provider: giscus

# disqus 配置参考：https://disqus.com
disqus:
    username:

# gitment 配置参考：https://imsun.net/posts/gitment-introduction/
gitment:
    owner: mauphilos
    repo: mauphilos.github.io-comments
    oauth:
        client_id:
        client_secret:

# gitalk 配置参考：https://github.com/gitalk/gitalk#install
gitalk:
    owner: mauphilos
    repo: mauphilos.github.io-comments
    clientID:
    clientSecret:

# utterances 配置参考：https://utteranc.es/
utterances:
    repo: mauphilos/mauphilos.github.io

# beaudar 配置参考：https://beaudar.lipk.org/
beaudar:
    repo: mauphilos/mauphilos.github.io

# giscus 配置参考：https://giscus.app/zh-CN
giscus:
    repo: mauphilos/mauphilos.github.io
    repo-id:
    category: Announcements
    category-id:

# 在使用其它评论组件时可点击显示 Disqus
lazy_load_disqus: false

# ---------------- #
#      Search      #
# ---------------- #
simple_jekyll_search:
    # 是否支持全文搜索
    fulltext: false
    # 最多显示多少条搜索结果
    limit: 10

# ---------------- #
#      Google      #
# ---------------- #
google:
    analytics_id:
    adsense:
        enabled: false
        footer: false
        sidebar: false
        sidebar-detail: false
        content_header: false
        content_footer: false
